spring.application.name=FdarnaCuisine

# Profil fly : configuration pour une base MySQL EXTERNE (pas de H2 en mémoire en production)
# Les valeurs réelles sont passées via les variables d'environnement sur la plateforme (Fly.io ou autre).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fdarnacuisine?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fdarna}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fdarna}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Pool de connexions Hikari pour la prod
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Tuning Tomcat pour mieux encaisser la charge
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Actuator / monitoring (à exposer derrière un proxy / sécurisé)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

