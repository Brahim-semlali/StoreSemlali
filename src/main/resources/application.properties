spring.application.name=StoreSemlali
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.port=8080

# Logs console — niveau réduit en environnement normal pour de meilleures performances
logging.level.com.example.fdarnacuisine=INFO
logging.level.com.example.fdarnacuisine.Controller.HomeController=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} — %msg%n

# PostgreSQL - base de données boutique vêtements
# Remplace 1234 ci-dessous par le MÊME mot de passe que pour psql -U postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/storesemlali}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Garder la session ouverte pendant le rendu de la vue (évite 500 sur page produit/catégorie)
spring.jpa.open-in-view=true
# Dialect détecté automatiquement par Spring pour PostgreSQL

# Upload des images — éviter erreur HTTP 413 (Payload Too Large). Limites augmentées.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=250MB
# Tomcat : limite POST (octets). 262144000 = 250 MB
server.tomcat.max-http-form-post-size=262144000
server.tomcat.max-swallow-size=262144000
# Dossier uploads : utiliser le répertoire du projet (fonctionne sous Windows)
store.upload-dir=${STORE_UPLOAD_DIR:uploads}
fdarna.upload-dir=${store.upload-dir}

# Email : notification admin à chaque commande / réservation
store.admin-email=${STORE_ADMIN_EMAIL:semlalibrahim539@gmail.com}
fdarna.admin-email=${store.admin-email}

# SMTP (ex. Gmail) — à configurer en prod via variables d'environnement
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
