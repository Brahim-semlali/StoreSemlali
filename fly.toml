# fly.toml app configuration file generated for fdarna-cuisine-cold-log-6528 on 2026-03-15T12:59:17Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "semlali-store"
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  SPRING_PROFILES_ACTIVE = 'fly'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
