services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: fdarnacuisine
      MYSQL_USER: fdarna
      MYSQL_PASSWORD: fdarna
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fdarnacuisine?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: fdarna
      SPRING_DATASOURCE_PASSWORD: fdarna
    ports:
      - "8081:8080"

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8082:80"

volumes:
  mysql_data:

